<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#a855f7" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Primary Meta Tags -->
    <title>AuraVault — Secure Team Cloud & Credential Bank</title>
    <meta name="title" content="AuraVault — Secure Team Cloud & Credential Bank" />
    <meta name="description" content="Secure, glassmorphic client-side digital headquarters for safeguarding company credentials, passwords, social handles, and team documents. Synced with Google Drive." />

    <!-- Open Graph / Facebook / WhatsApp Preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://auravault.io" />
    <meta property="og:title" content="AuraVault — Secure Team Cloud & Credential Bank" />
    <meta property="og:description" content="Secure, glassmorphic client-side digital headquarters for safeguarding company credentials, passwords, social handles, and team documents. Synced with Google Drive." />
    <meta property="og:image" content="/og-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://auravault.io" />
    <meta property="twitter:title" content="AuraVault — Secure Team Cloud & Credential Bank" />
    <meta property="twitter:description" content="Secure, glassmorphic client-side digital headquarters for safeguarding company credentials, passwords, social handles, and team documents. Synced with Google Drive." />
    <meta property="twitter:image" content="/og-preview.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA ServiceWorker registered successfully'))
            .catch(err => console.error('ServiceWorker registration failed:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
